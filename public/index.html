<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arogya – Your AI Health Companion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{--red:#c0272d;--red2:#e03535;--red3:#f16060;--redlight:#fff0f0;--redpale:#ffe4e4;--dark:#1a0a0a;--text:#2a0e0e;--muted:#8a5a5a;--white:#fff;--offwhite:#fafafa;--border:#f0d4d4;--shadow:0 8px 40px rgba(192,39,45,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh}
.page{min-height:100vh;display:flex;flex-direction:column}

/* LOGIN */
#loginPage{background:var(--dark);display:flex;align-items:center;justify-content:center;position:relative}
.login-card{background:rgba(255,255,255,.05);border-radius:24px;padding:40px;width:100%;max-width:420px}

/* BUTTON */
.btn-primary{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;cursor:pointer}
.btn-google{width:100%;background:#fff;border:none;border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer}

/* APP */
#appPage{display:none;flex-direction:column;padding:20px}
textarea{width:100%;padding:10px;margin-top:10px}
button{margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page">
  <div class="login-card">
    <h2 style="color:white;text-align:center">Arogya Login</h2>

    <button class="btn-google" onclick="loginGoogle()">Continue with Google</button>

    <input type="email" id="iEmail" placeholder="Email"/>
    <input type="password" id="iPass" placeholder="Password"/>

    <button class="btn-primary" onclick="doAuth()">Login</button>
    <p id="loginErr" style="color:red"></p>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="page">
  <h1>Arogya App</h1>

  <textarea id="symText" placeholder="Enter symptoms..."></textarea>
  <button onclick="analyse()">Analyse</button>

  <div id="result"></div>
</div>

<script>
// API CONFIG
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:5000/api'
  : window.location.origin + '/api';

// LOGIN
async function doAuth() {
  const email = document.getElementById('iEmail').value.trim();
  const pass  = document.getElementById('iPass').value.trim();

  if (!email || !pass) {
    document.getElementById('loginErr').innerText = "Enter email & password";
    return;
  }

  try {
    const res = await fetch(API + '/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "Login failed");

    localStorage.setItem('token', data.token);

    document.getElementById('loginPage').style.display='none';
    document.getElementById('appPage').style.display='flex';

  } catch(e){
    document.getElementById('loginErr').innerText = e.message;
  }
}

// GOOGLE LOGIN
function loginGoogle() {
  window.location.href = API + '/auth/google';
}

// ANALYSE
async function analyse() {
  const symptoms = document.getElementById('symText').value;

  try {
    const res = await fetch(API + '/ai/analyse', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+localStorage.getItem('token')
      },
      body:JSON.stringify({ symptoms })
    });

    const data = await res.json();

    document.getElementById('result').innerHTML =
      "<b>Result:</b><br>" + JSON.stringify(data.result, null, 2);

  } catch(e){
    alert("Error analysing");
  }
}
</script>

</body>
</html>
